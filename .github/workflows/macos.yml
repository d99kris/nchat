name: macOS

on:
  pull_request:
  push:
    branches:
      - master
      - main
      - dev/*

jobs:
  mac-build:
    runs-on: macos-latest
    steps:
    - name: Checkout
      # Check https://github.com/actions/checkout/releases for newer major versions.
      uses: actions/checkout@v5
    - name: Setup ccache
      uses: ./.github/actions/setup-ccache
    - name: Build macOS
      run: ./make.sh all -y
